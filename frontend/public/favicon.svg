<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="1" stop-color="#e8ecf4"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Monitor body -->
  <rect x="4.5" y="6" width="23" height="16" rx="2.5" fill="white" stroke="#d8dde8" stroke-width="1.2"/>
  <!-- Screen -->
  <rect x="6.5" y="8" width="19" height="12" rx="1.5" fill="url(#screen)"/>
  <!-- Screen UI: top bar -->
  <rect x="8.5" y="9.5" width="15" height="1.5" rx="0.75" fill="white" opacity="0.25"/>
  <!-- GPU chip representation: little squares on screen -->
  <rect x="8.5" y="12.5" width="4" height="4" rx="1" fill="url(#chip)" opacity="0.9"/>
  <rect x="9" y="13" width="3" height="3" rx="0.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.6"/>
  <!-- Data bars -->
  <rect x="14" y="13" width="8" height="1.2" rx="0.6" fill="white" opacity="0.5"/>
  <rect x="14" y="15.2" width="5" height="1.2" rx="0.6" fill="white" opacity="0.35"/>
  <rect x="14" y="17.4" width="6.5" height="1.2" rx="0.6" fill="white" opacity="0.35"/>
  <!-- Stand neck -->
  <rect x="14.8" y="22" width="2.4" height="2.5" rx="0.5" fill="#c8cdd8"/>
  <!-- Stand base -->
  <rect x="11" y="24.2" width="10" height="1.8" rx="0.9" fill="#c8cdd8"/>
</svg>
